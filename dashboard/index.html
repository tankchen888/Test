<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THRONE PROPERTY ｜ ERP 營運儀表板</title>
<style>
  :root{
    --gold:#A67C52; --gold-d:#8a6440; --gold-l:#c9a47e;
    --ink:#2c2620; --muted:#8c8175; --line:#e7ddd0;
    --bg:#faf7f2; --panel:#ffffff; --cream:#f4ece1;
    --pos:#5b7c5a; --neg:#b06a4f;
    --serif:"Songti TC","Noto Serif TC",Georgia,"Times New Roman",serif;
    --sans:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px 64px}

  /* header */
  header{background:linear-gradient(180deg,#fff 0%,var(--cream) 100%);border-bottom:2px solid var(--gold);padding:30px 0 22px}
  .brandrow{display:flex;align-items:center;gap:18px;justify-content:center;text-align:center;flex-direction:column}
  .logo{width:150px;height:auto;display:block}
  .brand-cn{font-family:var(--serif);font-size:22px;letter-spacing:.32em;color:var(--gold-d);padding-left:.32em}
  .brand-en{font-family:var(--serif);font-size:30px;letter-spacing:.42em;color:var(--gold);font-weight:600;padding-left:.42em}
  .brand-sub{font-size:11px;letter-spacing:.5em;color:var(--muted);padding-left:.5em}
  .dash-title{text-align:center;margin-top:18px;font-family:var(--serif);font-size:18px;color:var(--ink);letter-spacing:.1em}
  .meta{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}

  /* nav */
  nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:24px 0 28px}
  .tab{font-family:var(--serif);font-size:15px;letter-spacing:.12em;padding:9px 22px;border:1px solid var(--line);background:var(--panel);
       color:var(--muted);cursor:pointer;border-radius:2px;transition:.18s}
  .tab:hover{color:var(--gold-d);border-color:var(--gold-l)}
  .tab.active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 4px 14px rgba(166,124,82,.28)}

  section{display:none;animation:fade .35s ease}
  section.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .sec-h{font-family:var(--serif);font-size:17px;color:var(--gold-d);letter-spacing:.14em;margin:30px 0 14px;
         display:flex;align-items:center;gap:10px}
  .sec-h::before{content:"";width:18px;height:2px;background:var(--gold)}

  /* kpi cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:3px;padding:18px 18px 16px}
  .kpi .lab{font-size:12px;color:var(--muted);letter-spacing:.08em}
  .kpi .val{font-family:var(--serif);font-size:27px;color:var(--ink);margin-top:7px;line-height:1.1;font-weight:600}
  .kpi .val small{font-size:14px;color:var(--gold-d);font-weight:400;margin-left:2px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:5px}
  .kpi .val.pos{color:var(--pos)} .kpi .val.neg{color:var(--neg)}

  /* chart grid */
  .grid{display:grid;gap:16px;margin-top:16px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:880px){.g2,.g3{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:18px 18px 14px}
  .card h3{font-family:var(--serif);font-size:14px;color:var(--ink);letter-spacing:.08em;margin-bottom:14px;font-weight:600}
  .card h3 span{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0}

  /* bars */
  .bar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .bar .nm{width:118px;flex:0 0 118px;text-align:right;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .track{flex:1;background:var(--cream);border-radius:2px;height:18px;position:relative;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--gold));border-radius:2px;min-width:2px;transition:width .9s cubic-bezier(.2,.7,.2,1)}
  .bar .vl{flex:0 0 86px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}

  svg{display:block;width:100%;height:auto;overflow:visible}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:12px;color:var(--muted)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:48px;padding-top:18px;border-top:1px solid var(--line)}
  .note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}
</style>
</head>

function kpiCard(lab,val,sub,cls){
  return `<div class="kpi"><div class="lab">${lab}</div>
    <div class="val ${cls||''}">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}
function kpiRow(arr){return `<div class="kpis">${arr.join("")}</div>`;}

function barCard(title,sub,items,money){
  const max=Math.max(...items.map(d=>d.value),1);
  const rows=items.map(d=>{
    const w=(d.value/max*100).toFixed(1);
    const vl=money?fmtM(d.value):fmtN(d.value);
    return `<div class="bar"><div class="nm" title="${d.label}">${d.label}</div>
      <div class="track"><div class="fill" style="width:${w}%"></div></div>
      <div class="vl">${vl}</div></div>`;
  }).join("");
  return `<div class="card"><h3>${title} ${sub?`<span>${sub}</span>`:''}</h3>${rows}</div>`;
}

function lineCard(title,sub,items,money){
  const W=560,H=210,pl=52,pr=14,pt=16,pb=34;
  const xs=W-pl-pr, ys=H-pt-pb;
  const vals=items.map(d=>d.value), max=Math.max(...vals,1), min=0;
  const n=items.length;
  const X=i=> pl + (n<=1?xs/2:(i/(n-1))*xs);
  const Y=v=> pt + ys - ((v-min)/(max-min||1))*ys;
  let path="", area="", dots="";
  items.forEach((d,i)=>{ const x=X(i),y=Y(d.value);
    path += (i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";
    dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.6" fill="#A67C52"><title>${d.label}: ${money?fmtM(d.value):fmtN(d.value)}</title></circle>`;
  });
  area = `M${X(0).toFixed(1)} ${(pt+ys).toFixed(1)} `+path.replace(/^M/,"L")+`L${X(n-1).toFixed(1)} ${(pt+ys).toFixed(1)} Z`;
  // y gridlines
  let grid="",labs="";
  for(let g=0;g<=4;g++){ const v=max*g/4, y=Y(v);
    grid+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="#efe7da"/>`;
    labs+=`<text x="${pl-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#a89c8c">${money?fmtM(v):fmtN(v)}</text>`;
  }
  // x labels (sparse)
  let xlab=""; const step=Math.ceil(n/8);
  items.forEach((d,i)=>{ if(i%step===0||i===n-1){
    xlab+=`<text x="${X(i).toFixed(1)}" y="${H-12}" text-anchor="middle" font-size="9" fill="#a89c8c">${d.label.slice(2)}</text>`;}});
  return `<div class="card"><h3>${title} ${sub?`<span>${sub}</span>`:''}</h3>
    <svg viewBox="0 0 ${W} ${H}">
      ${grid}${labs}
      <path d="${area}" fill="url(#agrad)" opacity="0.25"/>
      <defs><linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#A67C52"/><stop offset="1" stop-color="#A67C52" stop-opacity="0"/></linearGradient></defs>
      <path d="${path}" fill="none" stroke="#A67C52" stroke-width="2"/>
      ${dots}${xlab}
    </svg></div>`;
}

function donutCard(title,sub,items,money){
  const total=items.reduce((s,d)=>s+d.value,0)||1;
  const cx=90,cy=90,r=66,sw=26; const C=2*Math.PI*r;
  let off=0, arcs="";
  items.forEach((d,i)=>{ const frac=d.value/total; const len=frac*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${GOLD[i%GOLD.length]}"
      stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}"
      stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"><title>${d.label}: ${(frac*100).toFixed(1)}%</title></circle>`;
    off+=len;
  });
  const leg=items.map((d,i)=>`<span><i style="background:${GOLD[i%GOLD.length]}"></i>${d.label} ${(d.value/total*100).toFixed(1)}%</span>`).join("");
  return `<div class="card"><h3>${title} ${sub?`<span>${sub}</span>`:''}</h3>
    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <svg viewBox="0 0 180 180" style="width:180px;flex:0 0 180px">${arcs}
        <text x="90" y="86" text-anchor="middle" font-size="12" fill="#8c8175">合計</text>
        <text x="90" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#2c2620">${money?fmtM(total):fmtN(total)}</text>
      </svg>
      <div class="legend" style="flex:1">${leg}</div>
    </div></div>`;
}

// tab switching
$("#nav").addEventListener("click",e=>{
  const t=e.target.closest(".tab"); if(!t) return;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll("section").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  $("#"+t.dataset.t).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
});
